spring.application.name=wallet-system
server.port=9090

spring.datasource.url=jdbc:h2:mem:walletdb;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=10000
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 console (visit http://localhost:9090/h2-console while the app is running)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Bean validation error messages returned as-is (no field path mangling)
server.error.include-message=always
